<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 속성</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 우주 배경 캔버스 -->
  <canvas id="cosmos"></canvas>

  <!-- 인트로: 흰 점 -->
  <div class="intro" id="intro">
    <button class="origin-dot" id="originDot" aria-label="시작"></button>
  </div>

  <!-- 단계별 입력 -->
  <div class="step-screen hidden" id="stepScreen">
    <div class="step-box">
      <p class="step-q" id="stepQ"></p>
      <div class="step-input-area" id="stepInputArea"></div>
      <button class="step-next hidden" id="stepNext">다음 →</button>
    </div>
    <div class="step-dots" id="stepDots"></div>
  </div>

  <!-- 로딩 -->
  <div class="loading-screen hidden" id="loadingScreen">
    <div class="loading-orbs" id="loadingOrbs">
      <div class="l-orb" style="--c:#5aad5a;--a:0deg"></div>
      <div class="l-orb" style="--c:#e06060;--a:72deg"></div>
      <div class="l-orb" style="--c:#c09a30;--a:144deg"></div>
      <div class="l-orb" style="--c:#9ab0d0;--a:216deg"></div>
      <div class="l-orb" style="--c:#5090d0;--a:288deg"></div>
    </div>
    <p class="loading-text">본질을 분석하고 있습니다</p>
  </div>

  <!-- 결과 -->
  <div class="result-screen hidden" id="resultScreen">
    <div class="result-inner">

      <!-- 심플 뷰 -->
      <div class="oh-hero" id="ohHero">
        <div class="oh-hero-meta" id="ohHeroMeta"></div>
        <div class="oh-hero-sym" id="ohHeroSym"></div>
        <div class="oh-hero-title" id="ohHeroTitle"></div>
        <div class="oh-hero-palette" id="ohHeroPalette"></div>
        <div class="oh-hero-tagline" id="ohHeroTagline"></div>
        <div class="oh-hero-keys" id="ohHeroKeys"></div>
        <button class="more-btn" id="moreBtn">설명 더보기</button>
      </div>

      <!-- 상세 뷰 (숨김) -->
      <div class="detail-section hidden" id="detailSection">
        <div class="card pillar-card">
          <div class="section-label">사주 팔자 <span class="lib-badge" id="libraryBadge"></span></div>
          <div class="pillar-table" id="pillarTable"></div>
        </div>
        <div class="card essence-card">
          <div class="section-label">본질 설명</div>
          <div class="essence-text" id="essenceText"></div>
          <div class="oh-mini-bars" id="ohMiniBars"></div>
        </div>
        <div class="card">
          <div class="section-label">오행 상생 · 상극</div>
          <div id="ohCycleCard"></div>
        </div>
        <div class="card">
          <div class="section-label">오행 분석</div>
          <div id="ohDetailList"></div>
        </div>
        <div class="card">
          <div class="section-label">풍수 · 나에게 맞는 공간</div>
          <div id="pungsuContent"></div>
        </div>
      </div>

      <button class="reset-btn" id="resetBtn">← 다시 찾기</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
  <script src="script.js"></script>
</body>
</html>
